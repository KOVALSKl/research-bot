[project]
name = "research-shared"
version = "0.1.0"
description = "Shared domain models and Qdrant storage abstractions"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "qdrant-client>=1.13",
    "fastembed>=0.6",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/research_shared"]
