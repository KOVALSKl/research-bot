services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # healthcheck:
    #   test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /readyz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 10

  core_api:
    build:
      context: .
      dockerfile: services/core_api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - qdrant
      # qdrant:
      #   condition: service_healthy
    profiles:
      - full
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
