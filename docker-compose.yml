services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # healthcheck:
    #   test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /readyz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  core_api:
    build:
      context: .
      dockerfile: services/core_api/Dockerfile
    ports:
      - "8880:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./researches:/app/researches
    depends_on:
      - qdrant
      - redis
      # qdrant:
      #   condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - full

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: host.docker.internal
    volumes:
      - ./researches:/app/researches
    depends_on:
      - qdrant
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - full

  vk_bot:
    build:
      context: .
      dockerfile: services/vk_bot/Dockerfile
    env_file:
      - .env
    environment:
      CORE_API_BASE_URL: http://core_api:8000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8081:8081"
    depends_on:
      - core_api
      - redis
    profiles:
      - full

volumes:
  qdrant_data:
  redis_data:
